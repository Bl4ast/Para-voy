<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-1: #05010d;
      --bg-2: #120321;
      --purple-1: #7b2cff;
      --purple-2: #b56cff;
      --purple-3: #e0b3ff;
      --glow: rgba(160, 76, 255, 0.8);
      --soft: rgba(181, 108, 255, 0.18);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 50%, rgba(90, 0, 170, 0.18), transparent 25%),
        radial-gradient(circle at 20% 20%, rgba(125, 0, 255, 0.12), transparent 20%),
        radial-gradient(circle at 80% 30%, rgba(168, 96, 255, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: white;
    }

    .universe {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stars,
    .particles,
    .rays {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: -20%;
      background-image:
        radial-gradient(2px 2px at 15% 20%, rgba(255,255,255,0.9), transparent 70%),
        radial-gradient(1.5px 1.5px at 70% 30%, rgba(214,170,255,0.9), transparent 70%),
        radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,0.8), transparent 70%),
        radial-gradient(1.5px 1.5px at 80% 80%, rgba(196,129,255,0.8), transparent 70%),
        radial-gradient(1.8px 1.8px at 45% 40%, rgba(255,255,255,0.8), transparent 70%),
        radial-gradient(1.5px 1.5px at 58% 60%, rgba(197,133,255,0.9), transparent 70%),
        radial-gradient(1.8px 1.8px at 90% 15%, rgba(255,255,255,0.85), transparent 70%),
        radial-gradient(1.5px 1.5px at 10% 85%, rgba(204,153,255,0.8), transparent 70%);
      animation: drift 40s linear infinite;
      opacity: 0.95;
    }

    .stars::after {
      transform: scale(1.2) rotate(8deg);
      filter: blur(0.5px);
      opacity: 0.45;
      animation-duration: 65s;
    }

    .centerpiece {
      position: relative;
      width: min(85vw, 650px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .accretion-ring,
    .accretion-ring::before,
    .accretion-ring::after {
      position: absolute;
      border-radius: 50%;
    }

    .accretion-ring {
      width: 78%;
      height: 78%;
      background:
        radial-gradient(circle, transparent 42%, rgba(159, 73, 255, 0.22) 52%, rgba(204, 151, 255, 0.5) 60%, transparent 72%),
        conic-gradient(from 0deg, transparent 0deg, rgba(190, 116, 255, 0.85) 70deg, transparent 130deg, rgba(120, 42, 255, 0.9) 220deg, transparent 280deg, rgba(225, 180, 255, 0.85) 340deg, transparent 360deg);
      filter: blur(2px) drop-shadow(0 0 28px rgba(162, 73, 255, 0.8));
      animation: spin 12s linear infinite;
      opacity: 0.9;
    }

    .accretion-ring::before {
      content: "";
      inset: 10%;
      border: 1px solid rgba(216, 172, 255, 0.5);
      filter: blur(0.5px);
      animation: pulse 3s ease-in-out infinite;
    }

    .accretion-ring::after {
      content: "";
      inset: -6%;
      border: 2px solid rgba(148, 68, 255, 0.16);
      filter: blur(4px);
    }

    .black-hole {
      position: absolute;
      width: 38%;
      height: 38%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 45%, #09020f 10%, #000 55%, #000 70%);
      box-shadow:
        0 0 0 10px rgba(125, 44, 255, 0.06),
        0 0 45px rgba(0, 0, 0, 1),
        0 0 80px rgba(167, 82, 255, 0.2),
        inset 0 0 30px rgba(255, 255, 255, 0.03);
      z-index: 3;
      animation: breathe 4s ease-in-out infinite;
    }

    .black-hole::before {
      content: "";
      position: absolute;
      inset: -16%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(177, 93, 255, 0.25), transparent 60%);
      filter: blur(18px);
      z-index: -1;
    }

    .message {
      position: absolute;
      z-index: 5;
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 1s ease, transform 1s ease;
      pointer-events: none;
      width: 90%;
    }

    .message h1 {
      font-size: clamp(1.8rem, 4vw, 3.8rem);
      letter-spacing: 0.12em;
      color: #f3ddff;
      text-shadow:
        0 0 10px rgba(214, 154, 255, 0.8),
        0 0 25px rgba(158, 68, 255, 0.8),
        0 0 50px rgba(127, 39, 255, 0.7);
      line-height: 1.4;
      word-break: break-word;
      text-transform: lowercase;
    }

    .controls {
      position: absolute;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(94vw, 1000px);
    }

    .voy-btn {
      border: 1px solid rgba(212, 166, 255, 0.35);
      background: rgba(92, 24, 161, 0.18);
      color: white;
      padding: 16px 30px;
      border-radius: 999px;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 20px rgba(131, 40, 250, 0.25),
        inset 0 0 20px rgba(203, 151, 255, 0.05);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .voy-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 0 28px rgba(170, 86, 255, 0.45),
        0 0 60px rgba(126, 31, 251, 0.28);
      background: rgba(122, 40, 214, 0.28);
    }

    .voy-btn:active {
      transform: scale(0.98);
    }

    .light-burst {
      position: absolute;
      inset: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(195,120,255,0.75), transparent 70%);
      filter: blur(1px);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
      pointer-events: none;
    }

    .active .message {
      opacity: 1;
      transform: scale(1);
    }

    .active .accretion-ring {
      animation-duration: 4s;
      filter: blur(2px) drop-shadow(0 0 35px rgba(192, 114, 255, 0.95));
    }

    .active .black-hole {
      box-shadow:
        0 0 0 14px rgba(147, 61, 255, 0.08),
        0 0 55px rgba(0, 0, 0, 1),
        0 0 120px rgba(168, 92, 255, 0.36),
        inset 0 0 40px rgba(255, 255, 255, 0.06);
    }

    .active .rays::before,
    .active .rays::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120vmax;
      height: 120vmax;
      transform: translate(-50%, -50%);
      background:
        conic-gradient(from 0deg,
          transparent 0deg,
          rgba(170, 90, 255, 0.22) 25deg,
          transparent 55deg,
          rgba(229, 177, 255, 0.16) 78deg,
          transparent 110deg,
          rgba(142, 39, 255, 0.24) 145deg,
          transparent 180deg,
          rgba(211, 156, 255, 0.18) 220deg,
          transparent 250deg,
          rgba(123, 44, 255, 0.2) 290deg,
          transparent 330deg,
          rgba(219, 185, 255, 0.18) 355deg,
          transparent 360deg);
      border-radius: 50%;
      filter: blur(26px);
      animation: spin 10s linear infinite;
      opacity: 0.9;
    }

    .active .rays::after {
      width: 90vmax;
      height: 90vmax;
      animation-direction: reverse;
      animation-duration: 6s;
      filter: blur(40px);
      opacity: 0.55;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes drift {
      from { transform: translateY(0) translateX(0); }
      50% { transform: translateY(2%) translateX(-1%); }
      to { transform: translateY(0) translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(198,130,255,0.8) 40%, rgba(126,46,255,0.2) 70%, transparent 80%);
      box-shadow: 0 0 18px rgba(188, 116, 255, 0.65);
      opacity: 0;
      transform: rotate(var(--angle)) translateX(0px) scale(0.2);
      animation: orbitBurst var(--duration) ease-out forwards;
      animation-delay: var(--delay);
    }

    @keyframes orbitBurst {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0px) scale(0.2);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(1.3);
      }
    }

    .flash {
      animation: flash 1.2s ease-out forwards;
    }

    @keyframes flash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(28);
      }
    }

    .gallery-overlay,
    .missions-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(123, 44, 255, 0.18), rgba(5, 1, 13, 0.94) 60%),
        linear-gradient(180deg, rgba(18, 3, 33, 0.9), rgba(5, 1, 13, 0.98));
      backdrop-filter: blur(12px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .gallery-overlay.show,
    .missions-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .gallery-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .gallery-bg img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.12);
      filter: blur(22px) brightness(0.35) saturate(1.2);
      transition: opacity 1s ease, transform 6s ease;
    }

    .gallery-bg img.active {
      opacity: 1;
      transform: scale(1.2);
    }

    .gallery-box,
    .missions-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 900px);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45), 0 0 60px rgba(171, 86, 255, 0.18);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .gallery-box {
      height: min(80vh, 620px);
    }

    .missions-box {
      width: min(94vw, 1100px);
      height: min(86vh, 760px);
      display: flex;
      flex-direction: column;
    }

    .gallery-top,
    .missions-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
    }

    .missions-top {
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .gallery-label,
    .missions-title {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .close-btn,
    .nav-btn {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .close-btn {
      padding: 10px 16px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    .close-btn:hover,
    .nav-btn:hover {
      background: rgba(181, 108, 255, 0.18);
      box-shadow: 0 0 24px rgba(190, 110, 255, 0.3);
      transform: scale(1.05);
    }

    .slides {
      position: absolute;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      opacity: 0;
      transform: scale(0.94) rotate(-1deg);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .photo-frame {
      position: relative;
      width: min(88%, 760px);
      height: min(76%, 470px);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 0 40px rgba(195, 114, 255, 0.18);
      background: rgba(255,255,255,0.04);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
      transition: transform 5s ease;
    }

    .slide.active .photo-frame img {
      transform: scale(1.12);
    }

    .photo-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 28%, transparent 60%, rgba(5,1,13,0.45));
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 26px;
      background: linear-gradient(180deg, transparent, rgba(8,0,16,0.25), rgba(8,0,16,0.85));
      text-align: center;
    }

    .caption h2 {
      font-size: clamp(1.4rem, 2.8vw, 2.3rem);
      color: #f7e6ff;
      margin-bottom: 8px;
      text-shadow: 0 0 16px rgba(213, 153, 255, 0.65);
    }

    .caption p {
      font-size: clamp(0.9rem, 1.5vw, 1rem);
      color: rgba(244, 225, 255, 0.84);
    }

    .nav-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 7;
      pointer-events: none;
    }

    .nav-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 1.4rem;
      pointer-events: auto;
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 7;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.26);
      border: 1px solid rgba(255,255,255,0.18);
      cursor: pointer;
      transition: 0.3s ease;
    }

    .dot.active {
      width: 28px;
      background: linear-gradient(90deg, #c584ff, #f2b6ff);
      box-shadow: 0 0 18px rgba(214, 146, 255, 0.45);
    }

    .missions-search {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 14px;
      padding: 18px 20px;
    }

    .missions-search input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 0.95rem;
    }

    .missions-search input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .missions-list {
      flex: 1;
      overflow: auto;
      padding: 0 20px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .mission-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 28px rgba(160, 76, 255, 0.10);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .mission-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 34px rgba(181, 108, 255, 0.22);
    }

    .mission-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .mission-card:hover img {
      transform: scale(1.04);
    }

    .mission-info {
      padding: 16px;
    }

    .mission-date {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(181, 108, 255, 0.12);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e8c8ff;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    .mission-info h3 {
      font-size: 1.1rem;
      color: #f7e6ff;
      margin-bottom: 8px;
      line-height: 1.35;
      word-break: break-word;
    }

    .mission-info p {
      color: rgba(244, 225, 255, 0.82);
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: rgba(255,255,255,0.68);
      padding: 40px 20px;
      font-size: 1rem;
    }

    .mission-viewer {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(123, 44, 255, 0.22), rgba(5, 1, 13, 0.95) 60%),
        linear-gradient(180deg, rgba(18, 3, 33, 0.92), rgba(5, 1, 13, 0.98));
      backdrop-filter: blur(14px);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .mission-viewer.show {
      opacity: 1;
      pointer-events: auto;
    }

    .mission-viewer-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.94);
      width: min(92vw, 900px);
      max-height: 88vh;
      overflow: auto;
      border-radius: 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 60px rgba(171, 86, 255, 0.2);
      backdrop-filter: blur(18px);
      transition: transform 0.35s ease;
    }

    .mission-viewer.show .mission-viewer-box {
      transform: translate(-50%, -50%) scale(1);
    }

    .mission-viewer-close {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 3;
    }

    .mission-viewer-image-wrap {
      width: 100%;
      height: min(58vh, 520px);
      overflow: hidden;
      border-radius: 28px 28px 0 0;
    }

    .mission-viewer-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: missionZoom 0.7s ease;
    }

    .mission-viewer-content {
      padding: 24px;
    }

    .mission-viewer-content h2 {
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      color: #f7e6ff;
      margin: 14px 0 10px;
      line-height: 1.2;
      text-shadow: 0 0 18px rgba(213, 153, 255, 0.25);
      word-break: break-word;
    }

    .mission-viewer-content p {
      color: rgba(244, 225, 255, 0.86);
      font-size: 1rem;
      line-height: 1.7;
      word-break: break-word;
    }

    @keyframes missionZoom {
      from {
        transform: scale(1.08);
        opacity: 0.5;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      .centerpiece {
        width: 95vw;
      }

      .voy-btn {
        padding: 14px 22px;
        font-size: 0.9rem;
        width: 100%;
      }

      .gallery-box {
        height: min(84vh, 640px);
        border-radius: 24px;
      }

      .missions-box {
        width: min(96vw, 1100px);
        height: min(88vh, 760px);
        border-radius: 22px;
      }

      .slide {
        padding: 18px;
      }

      .photo-frame {
        width: 100%;
        height: min(74%, 390px);
      }

      .nav-wrap {
        padding: 0 8px;
      }

      .nav-btn {
        width: 44px;
        height: 44px;
      }

      .missions-search {
        grid-template-columns: 1fr;
      }

      .mission-card img {
        height: 190px;
      }

      .mission-viewer-image-wrap {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="universe" id="universe">
    <div class="stars"></div>
    <div class="rays"></div>
    <div class="particles" id="particles"></div>

    <div class="centerpiece">
      <div class="accretion-ring"></div>
      <div class="black-hole"></div>
      <div class="message" id="message">
        <h1>⏁⟒ ⏃⋔⍜ ⎎⟟⌰⊑⏃</h1>
      </div>
    </div>

    <div class="light-burst" id="burst"></div>

    <div class="controls">
      <button class="voy-btn" id="voyBtn">voy clica aqui</button>
      <button class="voy-btn" id="galleryBtn">ver fotos da voy</button>
      <button class="voy-btn" id="missionsBtn">missões da voy</button>
    </div>
  </div>

  <div class="gallery-overlay" id="galleryOverlay">
    <div class="gallery-bg" id="galleryBg"></div>

    <div class="gallery-box">
      <div class="gallery-top">
        <div class="gallery-label">momentos da voy</div>
        <button class="close-btn" id="closeGallery">fechar</button>
      </div>

      <div class="nav-wrap">
        <button class="nav-btn" id="prevBtn">❮</button>
        <button class="nav-btn" id="nextBtn">❯</button>
      </div>

      <div class="slides" id="slides"></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <div class="missions-overlay" id="missionsOverlay">
    <div class="missions-box">
      <div class="missions-top">
        <div class="missions-title">missões da voy</div>
        <button class="close-btn" id="closeMissions">fechar</button>
      </div>

      <div class="missions-search">
        <input type="text" id="searchTitle" placeholder="procurar por título..." />
        <input type="date" id="searchDate" />
      </div>

      <div class="missions-list" id="missionsList"></div>
    </div>
  </div>

  <div class="mission-viewer" id="missionViewer">
    <div class="mission-viewer-box">
      <button class="close-btn mission-viewer-close" id="closeMissionViewer">fechar</button>

      <div class="mission-viewer-image-wrap">
        <img id="missionViewerImage" src="" alt="">
      </div>

      <div class="mission-viewer-content">
        <span class="mission-date" id="missionViewerDate"></span>
        <h2 id="missionViewerTitle"></h2>
        <p id="missionViewerText"></p>
      </div>
    </div>
  </div>

  <script>
    const universe = document.getElementById('universe');
    const button = document.getElementById('voyBtn');
    const particles = document.getElementById('particles');
    const burst = document.getElementById('burst');

    const galleryBtn = document.getElementById('galleryBtn');
    const galleryOverlay = document.getElementById('galleryOverlay');
    const closeGallery = document.getElementById('closeGallery');
    const slidesWrap = document.getElementById('slides');
    const dotsWrap = document.getElementById('dots');
    const galleryBg = document.getElementById('galleryBg');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const missionsBtn = document.getElementById('missionsBtn');
    const missionsOverlay = document.getElementById('missionsOverlay');
    const closeMissions = document.getElementById('closeMissions');
    const missionsList = document.getElementById('missionsList');
    const searchTitle = document.getElementById('searchTitle');
    const searchDate = document.getElementById('searchDate');

    const missionViewer = document.getElementById('missionViewer');
    const closeMissionViewer = document.getElementById('closeMissionViewer');
    const missionViewerImage = document.getElementById('missionViewerImage');
    const missionViewerDate = document.getElementById('missionViewerDate');
    const missionViewerTitle = document.getElementById('missionViewerTitle');
    const missionViewerText = document.getElementById('missionViewerText');


    //missões
    const galleryImages = [
      {
        src: 'Tamo iguais.png',
        title: 'INGUAISS!!!!',
        text: 'Nesse Dia eu fiquei tão feliz quando você simplesmente me mostrou isso....'
      },
      {
        src: 'Pidona.png',
        title: 'PIDONA',
        text: 'Eu não consigo negar NADA, quando você faz essa cara'
      },
      {
        src: 'Eu roxo com a voy.png',
        title: 'Roxos',
        text: 'Até que a gente combina quando estamos da mesma cor né?'
      },
      {
        src: 'Dormindos.png',
        title: 'Fofos',
        text: 'Pois é, nesse dia a gente tava brigado, mas quando você deitou do meu lado eu estava TÃO FELIZ'
      },
      {
        src: 'NEVE.png',
        title: 'NA NEVEE!!!!!',
        text: 'Acredita que tipo msm tendo poucas, todas são especiais'
      },
      {
        src: 'Na chuva.png',
        title: 'Mesmo em situações dificeis',
        text: 'Nesse dia tada tudo dando errado, a toshi aparecendo e tal... mas eu nn consigo olhar pra essa foto e nn imaginar o quanto você é linda'
      },
      {
        src: 'Carinho.png',
        title: 'É bizarro',
        text: 'É bizarro o fato de que tudo fica melhor com minha filha'
      }
    ];

    // missões
    const voyMissions = [
      {
        src: 'Ouvindo Filme.png',
        title: 'Ouvindo Crepusculo',
        date: '2026-04-02',
        text: 'Nem eu acreditei que eu escutei TRINTA MINUTOS disso.....'
      },
      {
        src: 'Foto com Orca.png',
        title: 'Fotinha com ORCA!!',
        date: '2026-04-01',
        text: ''
      },
      {
        src: 'Treino.png',
        title: 'Treinando magia fora de seu domínio.',
        date: '2026-04-02',
        text: ''
      },
      {
        src: 'Pintando.png',
        title: 'Desenhando!!',
        date: '2026-04-02',
        text: 'Vou ignorar o caba ali no fundo...'
      },
      {
        src: 'Buraco Negro.png',
        title: 'CONSTRUINDO!!!',
        date: '2026-04-02',
        text: ''
      },
    ];

    let currentIndex = 0;
    let autoSlide;

    function createParticles(amount = 65) {
      particles.innerHTML = '';

      for (let i = 0; i < amount; i++) {
        const p = document.createElement('span');
        p.className = 'particle';

        const angle = Math.random() * 360 + 'deg';
        const distance = 130 + Math.random() * 420 + 'px';
        const size = (2 + Math.random() * 8).toFixed(2) + 'px';
        const duration = (1.8 + Math.random() * 2.6).toFixed(2) + 's';
        const delay = (Math.random() * 0.8).toFixed(2) + 's';

        p.style.setProperty('--angle', angle);
        p.style.setProperty('--distance', distance);
        p.style.setProperty('--size', size);
        p.style.setProperty('--duration', duration);
        p.style.setProperty('--delay', delay);

        particles.appendChild(p);
      }
    }

    function triggerEffect() {
      universe.classList.remove('active');
      burst.classList.remove('flash');
      void universe.offsetWidth;

      createParticles(85);
      universe.classList.add('active');
      burst.classList.add('flash');

      button.textContent = 'mais luz para a voy';
    }

    button.addEventListener('click', triggerEffect);

    function buildGallery() {
      slidesWrap.innerHTML = '';
      dotsWrap.innerHTML = '';
      galleryBg.innerHTML = '';

      galleryImages.forEach((item, index) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.innerHTML = `
          <div class="photo-frame">
            <img src="${item.src}" alt="Foto ${index + 1} da Voy">
            <div class="caption">
              <h2>${item.title}</h2>
              <p>${item.text}</p>
            </div>
          </div>
        `;
        slidesWrap.appendChild(slide);

        const bg = document.createElement('img');
        bg.src = item.src;
        bg.alt = '';
        galleryBg.appendChild(bg);

        const dot = document.createElement('button');
        dot.className = 'dot';
        dot.addEventListener('click', () => showSlide(index));
        dotsWrap.appendChild(dot);
      });

      showSlide(0);
    }

    function showSlide(index) {
      currentIndex = (index + galleryImages.length) % galleryImages.length;

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const bgs = galleryBg.querySelectorAll('img');

      slides.forEach((slide, i) => slide.classList.toggle('active', i === currentIndex));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
      bgs.forEach((bg, i) => bg.classList.toggle('active', i === currentIndex));
    }

    function nextSlide() {
      showSlide(currentIndex + 1);
    }

    function prevSlide() {
      showSlide(currentIndex - 1);
    }

    function startAutoSlide() {
      clearInterval(autoSlide);
      autoSlide = setInterval(nextSlide, 4200);
    }

    function openGallery() {
      galleryOverlay.classList.add('show');
      startAutoSlide();
    }

    function closeGalleryOverlay() {
      galleryOverlay.classList.remove('show');
      clearInterval(autoSlide);
    }

    galleryBtn.addEventListener('click', openGallery);
    closeGallery.addEventListener('click', closeGalleryOverlay);

    nextBtn.addEventListener('click', () => {
      nextSlide();
      startAutoSlide();
    });

    prevBtn.addEventListener('click', () => {
      prevSlide();
      startAutoSlide();
    });

    galleryOverlay.addEventListener('click', (e) => {
      if (e.target === galleryOverlay) closeGalleryOverlay();
    });

    function renderMissions(list) {
      missionsList.innerHTML = '';

      if (!list.length) {
        missionsList.innerHTML = '<div class="no-results">nenhuma missão encontrada.</div>';
        return;
      }

      list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'mission-card';
        card.innerHTML = `
          <img src="${item.src}" alt="${item.title}">
          <div class="mission-info">
            <span class="mission-date">${item.date}</span>
            <h3>${item.title}</h3>
            <p>${item.text}</p>
          </div>
        `;

        card.addEventListener('click', () => openMissionViewer(item));
        missionsList.appendChild(card);
      });
    }

    function filterMissions() {
      const titleValue = searchTitle.value.toLowerCase().trim();
      const dateValue = searchDate.value;

      const filtered = voyMissions.filter(item => {
        const matchesTitle = item.title.toLowerCase().includes(titleValue);
        const matchesDate = !dateValue || item.date === dateValue;
        return matchesTitle && matchesDate;
      });

      renderMissions(filtered);
    }

    function openMissions() {
      missionsOverlay.classList.add('show');
      filterMissions();
    }

    function closeMissionsOverlay() {
      missionsOverlay.classList.remove('show');
    }

    function openMissionViewer(item) {
      missionViewerImage.src = item.src;
      missionViewerImage.alt = item.title;
      missionViewerDate.textContent = item.date;
      missionViewerTitle.textContent = item.title;
      missionViewerText.textContent = item.text;
      missionViewer.classList.add('show');
    }

    function closeMissionViewerOverlay() {
      missionViewer.classList.remove('show');
    }

    missionsBtn.addEventListener('click', openMissions);
    closeMissions.addEventListener('click', closeMissionsOverlay);
    searchTitle.addEventListener('input', filterMissions);
    searchDate.addEventListener('input', filterMissions);

    missionsOverlay.addEventListener('click', (e) => {
      if (e.target === missionsOverlay) closeMissionsOverlay();
    });

    closeMissionViewer.addEventListener('click', closeMissionViewerOverlay);

    missionViewer.addEventListener('click', (e) => {
      if (e.target === missionViewer) closeMissionViewerOverlay();
    });

    document.addEventListener('keydown', (e) => {
      if (galleryOverlay.classList.contains('show')) {
        if (e.key === 'Escape') closeGalleryOverlay();
        if (e.key === 'ArrowRight') {
          nextSlide();
          startAutoSlide();
        }
        if (e.key === 'ArrowLeft') {
          prevSlide();
          startAutoSlide();
        }
      }

      if (missionsOverlay.classList.contains('show') && e.key === 'Escape') {
        closeMissionsOverlay();
      }

      if (missionViewer.classList.contains('show') && e.key === 'Escape') {
        closeMissionViewerOverlay();
      }
    });

    buildGallery();
    renderMissions(voyMissions);
  </script>
</body>
</html>
